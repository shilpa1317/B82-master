<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>String Operation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <header class="text-primary text-center display-3">STRING OPERATIONS</header>
    <div class="container text-center w-50 my-5">
        <input type="text" class="form-control"  
        placeholder="Enter paragraph here" 
        id="inputPara"/>

        <div class="bg-secondary text-white mt-5" 
        style="height: 100px;">
            <span id="result1"></span>
        </div>
    </div>
    <div class="container w-50 text-center">
        <div class="row">
            <div class="col-3 mb-2">
                <button 
                class="btn btn-primary" 
                onclick="countVowels()">
                Count Vowels
                </button>
            </div>
            <div class="col-3"><button class="btn btn-primary"
                onclick="longestWord()"
                >Longest word</button></div>
            <div class="col-3"><button class="btn btn-primary">Check Palindrom</button></div>
            <div class="col-3"><button class="btn btn-primary">count spaces</button></div>
            <div class="col-3"><button class="btn btn-primary">Count New Lines</button></div>
            <div class="col-3"><button class="btn btn-primary">Convert Small Case</button></div>
            <div class="col-3"><button class="btn btn-primary">Capitalise</button></div>
            <div class="col-3"><button class="btn btn-primary">Convert title Case</button></div>
        </div>
    </div>
<script src="./scripts.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
