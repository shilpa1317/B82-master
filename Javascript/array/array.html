<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Array</h1>
    <div id="msg"></div>

    <ul id="fruits"></ul>

    <script>
        arrayFruit = ["Apple", "Banana", "Mango","Chickoo"]
        console.log(arrayFruit)
        document.getElementById("msg").textContent = "Fruit List"
        document.getElementById("fruits").innerHTML = 
                  arrayFruit.map((fruit,i)=>`
                                            <li>${fruit}</li>
                  `).join('')
    </script>

</body>
</html>
