<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-primary">
    <div class="container pt-5">
        <div class="row mt-3">
            <div class="col-6">
                <!-- Add Image here  -->
            </div>
            <div class="col-6 bg-light p-5 rounded">
                <!-- <form> -->
                <div class="mb-3">
                    <label for="userEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="userEmail" aria-describedby="emailHelp" value="Lion">
                    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                </div>
                <div class="mb-3">
                    <label for="userPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="userPassword">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                    <label class="form-check-label" for="exampleCheck1">Check me out</label>
                </div>
                <button type="button" class="btn btn-primary" onclick="loginCred()">Submit</button>
                <!-- </form> -->
            </div>
        </div>
    </div>
    <script>
        function loginCred() {
            emailDB = 'tiger@gmail.com'
            passwordDB = 'lion123'
            userEmailElement = document.getElementById('userEmail')
            useePasswordElement = document.getElementById('userPassword')

            uEmail = userEmailElement.value
            uPassword = useePasswordElement.value

            console.log(uEmail, uPassword)
            if (uEmail.length > 1) {
                if (uEmail == emailDB) {
                    if (uPassword == passwordDB) {
                        alert('Login success')
                        window.location.href = './outputFile.html'
                    } else {
                        alert('password wrong')
                        useePasswordElement.value = ''
                    }
                } else {
                    alert('Email not registered')
                }
            } else {
                alert('Please enter value')
            }

        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
