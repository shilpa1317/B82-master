<!DOCTYPE html>
<html>
<head>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #111;
}

/* Heart shape */
.circle {
  
  width: 60px;
  height: 60px;
  border: 6px solid #ccc;
  border-top: 6px solid red;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}



/* Container for text + spinner */
.loader-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: white;
  font-size: 20px;
  gap: 15px;
}



@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}



</style>
</head>



<div id="loader">
  <div class="loader-box">
    <p>Loading...</p>  <!-- TEXT ON TOP -->
    <div class="circle"></div>
  </div>
</div>





</body>
</html>
