<!DOCTYPE html>
<html>
<head>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #111;
}

/* Heart shape */
.heart {
  width: 100px;
  height: 100px;
  background: red;
  position: relative;
  transform: rotate(-45deg);
  animation: beat 1s infinite;
}

/* Circles */
.heart::before,
.heart::after {
  content: "";
  width: 100px;
  height: 100px;
  background: red;
  border-radius: 50%;
  position: absolute;
}

.heart::before {
  top: -50px;
  left: 0;
}

.heart::after {
  left: 50px;
  top: 0;
}

/* Animation */
@keyframes beat {
  0%   { transform: scale(1) rotate(-45deg); }
  50%  { transform: scale(1.2) rotate(-45deg); }
  100% { transform: scale(1) rotate(-45deg); }
}
</style>
</head>

<body>
  <div class="heart"></div>
</body>
</html>
